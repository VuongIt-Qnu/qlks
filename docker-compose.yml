version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: hotel_postgres
    environment:
      POSTGRES_DB: hotel_db
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hotel_net

  mongo:
    image: mongo:7
    container_name: hotel_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - hotel_net

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: hotel_backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: hotel_db
      POSTGRES_USER: hotel
      POSTGRES_PASSWORD: hotel123
      MONGO_HOST: mongo
      MONGO_PORT: "27017"
      JWT_SECRET: super-secret-key
    depends_on:
      - postgres
      - mongo
    ports:
      - "8080:8080"
    networks:
      - hotel_net

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: hotel_frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - hotel_net

networks:
  hotel_net:

volumes:
  postgres_data:
  mongo_data:
