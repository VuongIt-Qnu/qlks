# Example: Nginx reverse proxy on VPS (SSL + domain) in front of Docker frontend (port 3000) or backend (8080).
# Adjust server_name, paths, and upstreams.

upstream qlks_frontend {
    server 127.0.0.1:3000;
}

upstream qlks_api {
    server 127.0.0.1:8080;
}

server {
    listen 80;
    server_name your-domain.example;

    location /api/ {
        proxy_pass http://qlks_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://qlks_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
